<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 15px; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; border: 2px solid #ff6600; margin: 0; }
    .header { background: linear-gradient(135deg, #000, #ff6600, #00cc44); padding: 15px; text-align: center; margin: -15px -15px 15px -15px; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
    
    .btn { width: 100%; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; color: white; margin-bottom: 8px; font-size: 12px; }
    .btn:hover { transform: scale(1.02); }
    
    .btn-iniciar { background: #00cc44; color: #000; box-shadow: 0 4px 10px rgba(0,204,68,0.4); }
    .btn-iniciar:hover { background: #00ff44; }
    
    .btn-row { display: flex; gap: 8px; }
    .btn-pausar { background: #ffaa00; color: #000; box-shadow: 0 4px 10px rgba(255,170,0,0.3); }
    .btn-pausar:hover { background: #ffcc00; }
    
    .btn-parar { background: #cc0000; box-shadow: 0 4px 10px rgba(204,0,0,0.4); }
    .btn-parar:hover { background: #ff0000; }
    
    .btn-toggle { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px; }
    .btn-toggle-on  { background: #ff6600; box-shadow: 0 4px 10px rgba(255,102,0,0.5); }
    .btn-toggle-on:hover  { background: #ff8800; }
    .btn-toggle-off { background: #444; box-shadow: 0 4px 10px rgba(100,100,100,0.3); }
    .btn-toggle-off:hover { background: #555; }
    .led { width: 14px; height: 14px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .led-green { background: #00ff44; box-shadow: 0 0 8px #00ff44; }
    .led-gray  { background: #666; box-shadow: none; }
    .status { font-size: 11px; text-align: center; margin-top: 10px; color: #00cc44; font-weight: bold; padding: 8px; background: #111; border-radius: 5px; border: 1px solid #333; }
    .agent-info { font-size: 9px; text-align: center; margin-top: 6px; color: #ff6600; padding: 6px; background: #111; border-radius: 5px; border: 1px solid #ff6600; }
  </style>
</head>
<body>
  <div class="header"><h2>PROSPECÇÃO 🤖</h2></div>
  
  <button id="btnToggle" class="btn btn-toggle btn-toggle-off">
    <span class="led led-gray" id="ledIndicator"></span>
    <span id="toggleLabel">LIGAR ROBÔ</span>
  </button>

  <button id="btnIniciar" class="btn btn-iniciar">▶️ INICIAR / CONTINUAR</button>
  
  <div class="btn-row">
    <button id="btnPausar" class="btn btn-pausar">⏸️ PAUSAR</button>
    <button id="btnParar" class="btn btn-parar">⏹️ PARAR</button>
  </div>

  <div class="status" id="statusMsg">Aguardando comando...</div>
  <div class="agent-info">🤖 Agentes: Watchdog · Retry · Recovery · Analyzer</div>
  
  <script src="popup.js"></script>
</body>
</html>
