<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 15px; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; border: 2px solid #ff007f; margin: 0; }
    .header { background: linear-gradient(135deg, #000, #4b0082, #ff007f); padding: 15px; text-align: center; margin: -15px -15px 15px -15px; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
    
    .btn { width: 100%; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; color: white; margin-bottom: 8px; font-size: 12px; }
    .btn:hover { transform: scale(1.02); }
    
    .btn-iniciar { background: #ff007f; box-shadow: 0 4px 10px rgba(255,0,127,0.4); }
    .btn-iniciar:hover { background: #ff3399; }
    
    .btn-row { display: flex; gap: 8px; }
    .btn-pausar { background: #ffaa00; color: #000; box-shadow: 0 4px 10px rgba(255,170,0,0.3); }
    .btn-pausar:hover { background: #ffcc00; }
    
    .btn-parar { background: #cc0000; box-shadow: 0 4px 10px rgba(204,0,0,0.4); }
    .btn-parar:hover { background: #ff0000; }
    
    .status { font-size: 11px; text-align: center; margin-top: 10px; color: #00ffcc; font-weight: bold; padding: 8px; background: #111; border-radius: 5px; border: 1px solid #333; }
    .agent-info { font-size: 9px; text-align: center; margin-top: 6px; color: #e0b0ff; padding: 6px; background: #111; border-radius: 5px; border: 1px solid #4b0082; }
  </style>
</head>
<body>
  <div class="header"><h2>PROSPECÇÃO MARATONA 🤖</h2></div>
  
  <button id="btnIniciar" class="btn btn-iniciar">▶️ INICIAR / CONTINUAR</button>
  
  <div class="btn-row">
    <button id="btnPausar" class="btn btn-pausar">⏸️ PAUSAR</button>
    <button id="btnParar" class="btn btn-parar">⏹️ PARAR</button>
  </div>

  <div class="status" id="statusMsg">Aguardando comando...</div>
  <div class="agent-info">🤖 Agentes: Watchdog · Retry · Recovery · Analyzer</div>
  
  <script src="popup.js"></script>
</body>
</html>
